openapi: 3.0.3
info:
  title: CTF 解题赛系统 API
  version: 2.0.0
  description: Jeopardy CTF 平台后端 API — 题目管理 + flag 提交 + 比赛管理 + 排行榜 + 通知

servers:
  - url: http://localhost:8080

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Token，claims 包含 sub(user_id) 和 role

  schemas:
    Challenge:
      type: object
      properties:
        id:          { type: integer, format: int64, description: snowflake res_id }
        title:       { type: string }
        category:    { type: string }
        description: { type: string }
        score:       { type: integer }
        is_enabled:  { type: boolean }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    Submission:
      type: object
      properties:
        id:             { type: integer, format: int64, description: snowflake res_id }
        user_id:        { type: string }
        challenge_id:   { type: integer, format: int64 }
        competition_id: { type: integer, format: int64, nullable: true }
        submitted_flag: { type: string }
        is_correct:     { type: boolean }
        created_at:     { type: string, format: date-time }

    Competition:
      type: object
      properties:
        id:          { type: integer, format: int64, description: snowflake res_id }
        title:       { type: string }
        description: { type: string }
        start_time:  { type: string, format: date-time }
        end_time:    { type: string, format: date-time }
        is_active:   { type: boolean }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    Notification:
      type: object
      properties:
        id:             { type: integer, format: int64, description: snowflake res_id }
        competition_id: { type: integer, format: int64 }
        title:          { type: string }
        message:        { type: string }
        created_at:     { type: string, format: date-time }

    LeaderboardEntry:
      type: object
      properties:
        rank:           { type: integer }
        user_id:        { type: string }
        total_score:    { type: integer }
        last_solve_time: { type: string, format: date-time }

    Error:
      type: object
      properties:
        error: { type: string }

security:
  - BearerAuth: []

paths:
  # ─── 题目 ───

  /api/v1/challenges:
    get:
      summary: 获取题目列表
      description: 返回所有已启用的题目，不含 flag 字段
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  challenges:
                    type: array
                    items:
                      $ref: '#/components/schemas/Challenge'
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/challenges/{id}:
    get:
      summary: 获取单个题目
      description: 返回指定已启用题目的详情，不含 flag 字段
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Challenge' }
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: 题目不存在或未启用
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/challenges/{id}/submit:
    post:
      summary: 提交 flag（全局）
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [flag]
              properties:
                flag: { type: string, example: "flag{hello_world}" }
      responses:
        '200':
          description: 提交结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message:
                    type: string
                    enum: [correct, incorrect, already_solved]
        '400':
          description: 缺少 flag 字段
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: 题目不存在
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ─── 比赛 ───

  /api/v1/competitions:
    get:
      summary: 获取活跃比赛列表
      description: 返回所有 is_active=1 的比赛
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  competitions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Competition'
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/competitions/{id}:
    get:
      summary: 获取单个比赛
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Competition' }
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: 比赛不存在
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/competitions/{id}/challenges:
    get:
      summary: 获取比赛的题目列表
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  challenges:
                    type: array
                    items:
                      $ref: '#/components/schemas/Challenge'
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/competitions/{comp_id}/challenges/{id}/submit:
    post:
      summary: 在比赛中提交 flag
      parameters:
        - name: comp_id
          in: path
          required: true
          schema: { type: integer, format: int64 }
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [flag]
              properties:
                flag: { type: string }
      responses:
        '200':
          description: 提交结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message:
                    type: string
                    enum: [correct, incorrect, already_solved]
        '400':
          description: 缺少 flag 字段
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: 比赛或题目不存在
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ─── 管理员 - 题目 ───

  /api/v1/admin/challenges:
    post:
      summary: 创建题目
      description: 需要 admin 角色
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, flag]
              properties:
                title:       { type: string, maxLength: 255 }
                category:    { type: string, default: misc }
                description: { type: string, maxLength: 4096 }
                score:       { type: integer, default: 100 }
                flag:        { type: string, maxLength: 255 }
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer, format: int64 }
        '400':
          description: 参数错误
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: 非管理员
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/admin/challenges/{id}:
    put:
      summary: 更新题目
      description: 需要 admin 角色，只更新传入的非零字段
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:       { type: string, maxLength: 255 }
                category:    { type: string }
                description: { type: string, maxLength: 4096 }
                score:       { type: integer }
                flag:        { type: string, maxLength: 255 }
                is_enabled:  { type: boolean }
      responses:
        '204': { description: 更新成功 }
        '400':
          description: 参数错误
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: 非管理员
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: 题目不存在
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    delete:
      summary: 删除题目
      description: 需要 admin 角色
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: 删除成功 }
        '400':
          description: 参数错误
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: 非管理员
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ─── 管理员 - 提交记录 ───

  /api/v1/admin/submissions:
    get:
      summary: 查看提交记录
      description: 需要 admin 角色，支持按 user_id 和 challenge_id 过滤
      parameters:
        - name: user_id
          in: query
          schema: { type: string }
        - name: challenge_id
          in: query
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  submissions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Submission'
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: 非管理员
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ─── 管理员 - 比赛 ───

  /api/v1/admin/competitions:
    post:
      summary: 创建比赛
      description: 需要 admin 角色
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, start_time, end_time]
              properties:
                title:       { type: string, maxLength: 255 }
                description: { type: string, maxLength: 4096 }
                start_time:  { type: string, format: date-time }
                end_time:    { type: string, format: date-time }
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer, format: int64 }
        '400':
          description: 参数错误
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: 非管理员
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    get:
      summary: 获取所有比赛（含未激活）
      description: 需要 admin 角色
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  competitions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Competition'
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: 非管理员
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/admin/competitions/{id}:
    put:
      summary: 更新比赛
      description: 需要 admin 角色，只更新传入的非零字段
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:       { type: string, maxLength: 255 }
                description: { type: string, maxLength: 4096 }
                start_time:  { type: string, format: date-time }
                end_time:    { type: string, format: date-time }
                is_active:   { type: boolean }
      responses:
        '204': { description: 更新成功 }
        '400':
          description: 参数错误
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: 非管理员
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: 比赛不存在
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    delete:
      summary: 删除比赛
      description: 需要 admin 角色
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: 删除成功 }
        '400':
          description: 参数错误
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: 非管理员
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/admin/competitions/{id}/challenges:
    post:
      summary: 为比赛添加题目
      description: 需要 admin 角色
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [challenge_id]
              properties:
                challenge_id: { type: integer, format: int64 }
      responses:
        '201':
          description: 添加成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer, format: int64 }
        '400':
          description: 参数错误
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: 非管理员
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/admin/competitions/{id}/challenges/{challenge_id}:
    delete:
      summary: 从比赛中移除题目
      description: 需要 admin 角色
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
        - name: challenge_id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: 移除成功 }
        '400':
          description: 参数错误
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: 非管理员
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ─── 管理员 - 通知 ───

  /api/v1/admin/competitions/{id}/notifications:
    post:
      summary: 为比赛创建通知
      description: 需要 admin 角色
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, message]
              properties:
                title:   { type: string }
                message: { type: string }
      responses:
        '201': { description: 创建成功 }
        '400':
          description: 参数错误（title 和 message 不能为空）
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: 非管理员
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ─── 通知 ───

  /api/v1/competitions/{id}/notifications:
    get:
      summary: 获取比赛通知列表
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  notifications:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ─── 排行榜 ───

  /api/v1/competitions/{id}/leaderboard:
    get:
      summary: 获取比赛排行榜
      description: 按总得分降序，同分按最后解题时间升序排列
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  leaderboard:
                    type: array
                    items:
                      $ref: '#/components/schemas/LeaderboardEntry'
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
