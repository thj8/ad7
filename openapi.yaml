openapi: 3.0.3
info:
  title: CTF 解题赛系统 API
  version: 3.0.0
  description: |
    Jeopardy CTF 平台后端 API — 双服务架构。
    CTF 服务器（端口 8080）：题目管理 + flag 提交 + 比赛管理 + 排行榜 + 通知 + 提示 + 分析 + 一二三血。
    Auth 服务器（端口 8081）：用户注册/登录 + JWT 验证 + 队伍管理。

servers:
  - url: http://localhost:8080
    description: CTF 服务器
  - url: http://localhost:8081
    description: Auth 服务器

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Token，claims 包含 sub(user_id) 和 role

  parameters:
    ResID:
      name: id
      in: path
      required: true
      schema: { type: string, maxLength: 32 }
      description: 32 字符十六进制 res_id（无连字符）

  schemas:
    # ── 通用 ──

    Error:
      type: object
      properties:
        error: { type: string }

    # ── Auth schemas ──

    User:
      type: object
      properties:
        id:         { type: string, description: res_id }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        username:   { type: string }
        role:       { type: string }
        team_id:    { type: string, description: 所属队伍 res_id，可为空 }

    Team:
      type: object
      properties:
        id:          { type: string, description: res_id }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }
        name:        { type: string }
        description: { type: string }

    # ── CTF schemas ──

    Challenge:
      type: object
      properties:
        id:          { type: string, description: res_id }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }
        title:       { type: string }
        category:    { type: string }
        description: { type: string }
        score:       { type: integer }
        is_enabled:  { type: boolean }

    Submission:
      type: object
      properties:
        id:             { type: string, description: res_id }
        created_at:     { type: string, format: date-time }
        updated_at:     { type: string, format: date-time }
        user_id:        { type: string }
        challenge_id:   { type: string }
        competition_id: { type: string }
        submitted_flag: { type: string }
        is_correct:     { type: boolean }

    Competition:
      type: object
      properties:
        id:          { type: string, description: res_id }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }
        title:       { type: string }
        description: { type: string }
        start_time:  { type: string, format: date-time }
        end_time:    { type: string, format: date-time }
        is_active:   { type: boolean }

    Notification:
      type: object
      properties:
        id:             { type: string, description: res_id }
        created_at:     { type: string, format: date-time }
        updated_at:     { type: string, format: date-time }
        competition_id: { type: string }
        title:          { type: string }
        message:        { type: string }

    Hint:
      type: object
      properties:
        id:         { type: string, description: res_id }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        content:    { type: string }
        is_visible: { type: boolean }

    LeaderboardEntry:
      type: object
      properties:
        rank:            { type: integer }
        user_id:         { type: string }
        total_score:     { type: integer }
        last_solve_time: { type: string, format: date-time }
        challenges:
          type: array
          items:
            type: object
            properties:
              challenge_id: { type: string }
              solved:       { type: boolean }
              blood_rank:   { type: integer, description: 一二三血排名（1/2/3），仅已解且有排名时返回 }
              solved_at:    { type: string, format: date-time }

    TopThreeChallenge:
      type: object
      properties:
        challenge_id: { type: string }
        title:        { type: string }
        category:     { type: string }
        score:        { type: integer }
        top_three:
          type: array
          items:
            type: object
            properties:
              ranking:    { type: integer, description: 排名 1-3 }
              user_id:    { type: string }
              created_at: { type: string, format: date-time }

    AnalyticsOverview:
      type: object
      properties:
        total_users:               { type: integer }
        total_challenges:          { type: integer }
        total_submissions:         { type: integer }
        correct_submissions:       { type: integer }
        average_solves:            { type: number }
        average_solve_time_seconds: { type: string, description: 格式化为两位小数的字符串 }
        completion_rate:           { type: number }

    AnalyticsCategory:
      type: object
      properties:
        category:              { type: string }
        total_challenges:      { type: integer }
        total_solves:          { type: integer }
        unique_users_solved:   { type: integer }
        average_solves_per_user: { type: number }
        success_rate:          { type: number }

    AnalyticsUser:
      type: object
      properties:
        user_id:         { type: string }
        total_solves:    { type: integer }
        total_score:     { type: integer }
        total_attempts:  { type: integer }
        success_rate:    { type: number }
        first_solve_time: { type: string, format: date-time }
        last_solve_time:  { type: string, format: date-time }

    AnalyticsChallenge:
      type: object
      properties:
        challenge_id:             { type: string }
        title:                    { type: string }
        category:                 { type: string }
        score:                    { type: integer }
        total_solves:             { type: integer }
        total_attempts:           { type: integer }
        success_rate:             { type: number }
        unique_users_solved:      { type: integer }
        first_solve_time:         { type: string, format: date-time }
        average_solve_time_seconds: { type: string, description: 格式化为两位小数的字符串 }

    SubmitResult:
      type: object
      properties:
        success: { type: boolean }
        message:
          type: string
          enum: [correct, incorrect, already_solved]

security:
  - BearerAuth: []

# ══════════════════════════════════════════
#  Auth 服务器路由（端口 8081）
# ══════════════════════════════════════════

paths:
  # ─── Auth - 公共路由（无认证） ───

  /api/v1/register:
    post:
      summary: 注册用户
      description: 创建新用户，返回用户信息（不含密码）
      security: []
      servers:
        - url: http://localhost:8081
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string, maxLength: 255 }
                password: { type: string }
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:       { type: string }
                  username: { type: string }
                  role:     { type: string }
        '400':
          description: 用户名或密码为空
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: 用户名已存在
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/login:
    post:
      summary: 用户登录
      description: 验证用户名密码，返回 JWT token
      security: []
      servers:
        - url: http://localhost:8081
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string, description: JWT token }
        '401':
          description: 用户名或密码错误
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/verify:
    post:
      summary: 验证 JWT token
      description: 内部接口，CTF 中间件调用此端点验证 token 有效性
      security: []
      servers:
        - url: http://localhost:8081
      responses:
        '200':
          description: token 有效
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id: { type: string }
                  role:    { type: string }
        '401':
          description: token 无效或缺失
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ─── Auth - 队伍路由（需认证） ───

  /api/v1/teams:
    get:
      summary: 获取队伍列表
      servers:
        - url: http://localhost:8081
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  teams:
                    type: array
                    items:
                      $ref: '#/components/schemas/Team'
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/teams/{id}:
    get:
      summary: 获取单个队伍
      servers:
        - url: http://localhost:8081
      parameters:
        - $ref: '#/components/parameters/ResID'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: 队伍不存在
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/teams/{id}/members:
    get:
      summary: 获取队伍成员列表
      servers:
        - url: http://localhost:8081
      parameters:
        - $ref: '#/components/parameters/ResID'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ─── Auth - 管理员队伍路由 ───

  /api/v1/admin/teams:
    post:
      summary: 创建队伍
      description: 需要 admin 角色
      servers:
        - url: http://localhost:8081
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:        { type: string, maxLength: 255 }
                description: { type: string, maxLength: 4096 }
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
        '400':
          description: 参数错误
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: 非管理员
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/admin/teams/{id}:
    put:
      summary: 更新队伍
      description: 需要 admin 角色
      servers:
        - url: http://localhost:8081
      parameters:
        - $ref: '#/components/parameters/ResID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:        { type: string, maxLength: 255 }
                description: { type: string, maxLength: 4096 }
      responses:
        '204':
          description: 更新成功
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: 非管理员
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: 队伍不存在
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    delete:
      summary: 删除队伍
      description: 需要 admin 角色。删除前自动移除所有成员
      servers:
        - url: http://localhost:8081
      parameters:
        - $ref: '#/components/parameters/ResID'
      responses:
        '204':
          description: 删除成功
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: 非管理员
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/admin/teams/{id}/members:
    post:
      summary: 添加队伍成员
      description: 需要 admin 角色。将用户加入队伍
      servers:
        - url: http://localhost:8081
      parameters:
        - $ref: '#/components/parameters/ResID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id: { type: string, description: 用户 res_id }
      responses:
        '200':
          description: 添加成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: ok }
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: 非管理员
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/admin/teams/{id}/members/{user_id}:
    delete:
      summary: 移除队伍成员
      description: 需要 admin 角色
      servers:
        - url: http://localhost:8081
      parameters:
        - $ref: '#/components/parameters/ResID'
        - name: user_id
          in: path
          required: true
          schema: { type: string }
          description: 用户 res_id
      responses:
        '204':
          description: 移除成功
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: 非管理员
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ══════════════════════════════════════════
  #  CTF 服务器路由（端口 8080）
  # ══════════════════════════════════════════

  # ─── 题目 ───

  /api/v1/challenges:
    get:
      summary: 获取题目列表
      description: 返回所有已启用的题目，不含 flag 字段
      servers:
        - url: http://localhost:8080
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  challenges:
                    type: array
                    items:
                      $ref: '#/components/schemas/Challenge'
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/challenges/{id}:
    get:
      summary: 获取单个题目
      description: 返回指定已启用题目的详情，不含 flag 字段
      servers:
        - url: http://localhost:8080
      parameters:
        - $ref: '#/components/parameters/ResID'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Challenge'
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: 题目不存在或未启用
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ─── 比赛 ───

  /api/v1/competitions:
    get:
      summary: 获取活跃比赛列表
      description: 返回所有 is_active=1 且未软删除的比赛
      servers:
        - url: http://localhost:8080
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  competitions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Competition'
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/competitions/{id}:
    get:
      summary: 获取单个比赛
      servers:
        - url: http://localhost:8080
      parameters:
        - $ref: '#/components/parameters/ResID'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Competition'
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: 比赛不存在
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/competitions/{id}/challenges:
    get:
      summary: 获取比赛的题目列表
      servers:
        - url: http://localhost:8080
      parameters:
        - $ref: '#/components/parameters/ResID'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  challenges:
                    type: array
                    items:
                      $ref: '#/components/schemas/Challenge'
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ─── 提交 flag ───

  /api/v1/competitions/{comp_id}/challenges/{id}/submit:
    post:
      summary: 在比赛中提交 flag
      description: |
        提交 flag 到指定比赛的指定题目。正确提交会触发 EventCorrectSubmission 事件，
        topthree 插件记录一血/二血/三血。按用户 ID 限流（3 次/10 秒）。
      servers:
        - url: http://localhost:8080
      parameters:
        - name: comp_id
          in: path
          required: true
          schema: { type: string }
          description: 比赛 res_id
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: 题目 res_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [flag]
              properties:
                flag: { type: string, example: "flag{hello_world}" }
      responses:
        '200':
          description: 提交结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitResult'
        '400':
          description: 缺少 flag 字段
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: 比赛或题目不存在
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: 请求过于频繁
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ─── 管理员 - 题目 ───

  /api/v1/admin/challenges:
    post:
      summary: 创建题目
      description: 需要 admin 角色
      servers:
        - url: http://localhost:8080
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, flag]
              properties:
                title:       { type: string, maxLength: 255 }
                category:    { type: string, default: misc }
                description: { type: string, maxLength: 4096 }
                score:       { type: integer, default: 100 }
                flag:        { type: string, maxLength: 255 }
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
        '400':
          description: 参数错误
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: 非管理员
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/admin/challenges/{id}:
    put:
      summary: 更新题目
      description: 需要 admin 角色，只更新传入的非零字段
      servers:
        - url: http://localhost:8080
      parameters:
        - $ref: '#/components/parameters/ResID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:       { type: string, maxLength: 255 }
                category:    { type: string }
                description: { type: string, maxLength: 4096 }
                score:       { type: integer }
                flag:        { type: string, maxLength: 255 }
                is_enabled:  { type: boolean }
      responses:
        '204':
          description: 更新成功
        '400':
          description: 参数错误
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: 非管理员
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: 题目不存在
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    delete:
      summary: 删除题目（软删除）
      description: 需要 admin 角色
      servers:
        - url: http://localhost:8080
      parameters:
        - $ref: '#/components/parameters/ResID'
      responses:
        '204':
          description: 删除成功
        '401':
          description: 未认证
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: 非管理员
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ─── 管理员 - 提交记录 ───

  /api/v1/admin/competitions/{id}/submissions:
    get:
      summary: 查看比赛提交记录
      description: 需要 admin 角色
      servers:
        - url: http://localhost:8080
      parameters:
        - $ref: '#/components/parameters/ResID'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  submissions:
                    type: array
